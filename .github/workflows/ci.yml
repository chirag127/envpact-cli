name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Lint (syntax check)
        shell: bash
        run: |
          for f in bin/envpact.js lib/*.js tests/*.test.js; do
            node --check "$f"
          done
      - name: Test
        shell: bash
        run: node --test tests/*.test.js
      - name: Smoke test CLI
        shell: bash
        run: |
          node bin/envpact.js --version
          node bin/envpact.js --help
